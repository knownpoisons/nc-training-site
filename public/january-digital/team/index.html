<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Team — January Digital × NotContent</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Meet the January Digital × NotContent AI creative training cohort." />
<link rel="icon" type="image/png" href="/january-digital/nct-globe.png" />
<style>
  :root {
    --bg: #E5E4E2;
    --ink: #0E0E0C;
    --muted: #5F5F60;
    --rule: #C2C1BF;
    --accent: #1338BE;
    --surface: #EFEEEC;
    --serif: "Iowan Old Style", "Cooper Hewitt", "Source Serif Pro", Georgia, serif;
    --sans: -apple-system, "Inter", "Helvetica Neue", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ─── Topbar ─── */
  .topbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 100;
    padding: 16px 40px; display: flex; justify-content: space-between; align-items: center;
    font-family: var(--sans); font-size: 12px; letter-spacing: 0.2em;
    text-transform: uppercase; color: rgba(229,228,226,0.9);
  }
  .topbar .back { text-decoration: none; color: #fff; font-weight: 600; }
  .topbar .back .arrow { margin-right: 8px; }
  .topbar .label { font-weight: 600; color: #fff; }

  /* ─── Header image ─── */
  .hero-img {
    position: relative;
    width: 100%;
    line-height: 0;
    background: var(--accent);
  }
  .hero-img img {
    display: block;
    width: 100%;
    height: auto;
  }

  /* ─── Card grid ─── */
  .cards-section {
    max-width: 1100px;
    margin: 0 auto;
    padding: 8vh 40px 12vh;
  }
  .cards-section .head {
    text-align: center;
    margin-bottom: 6vh;
  }
  .cards-section .eyebrow {
    font-family: var(--sans); font-size: 11px; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 12px;
  }
  .cards-section h2 {
    font-family: var(--serif);
    font-size: clamp(32px, 4.5vw, 52px);
    font-weight: 400; line-height: 1; letter-spacing: -0.025em;
  }
  .cards-section h2 .accent { color: var(--accent); }

  .card-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 32px;
    justify-content: center;
  }

  /* ─── Individual card ─── */
  .id-card {
    position: relative;
    width: 260px;
    flex-shrink: 0;
    aspect-ratio: 3 / 4.2;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.08);
    will-change: transform;
    perspective: 800px;
  }
  .id-card .card-inner {
    width: 100%; height: 100%;
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    transform-style: preserve-3d;
    position: relative;
  }
  .id-card .card-front,
  .id-card .card-back {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 10px;
    overflow: hidden;
  }
  .id-card .card-back {
    transform: rotateY(180deg);
    background: var(--accent);
  }
  .id-card .card-front img,
  .id-card .card-back img {
    display: block; width: 100%; height: 100%; object-fit: cover;
  }

  /* Jiggle on hover */
  @keyframes jiggle {
    0%, 100% { transform: rotate(var(--rot)); }
    20%  { transform: rotate(calc(var(--rot) + 3deg)); }
    40%  { transform: rotate(calc(var(--rot) - 2.5deg)); }
    60%  { transform: rotate(calc(var(--rot) + 1.5deg)); }
    80%  { transform: rotate(calc(var(--rot) - 1deg)); }
  }
  .id-card:hover {
    animation: jiggle 0.5s ease-in-out;
    box-shadow: 0 16px 44px rgba(19, 56, 190, 0.2), 0 6px 16px rgba(0, 0, 0, 0.1);
  }

  /* Holographic sheen overlay */
  .id-card .card-front::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(
      135deg,
      rgba(255,255,255,0) 0%,
      rgba(255,255,255,0.1) 40%,
      rgba(19,56,190,0.08) 50%,
      rgba(255,255,255,0.1) 60%,
      rgba(255,255,255,0) 100%
    );
    pointer-events: none; opacity: 0; transition: opacity 0.3s;
  }
  .id-card:hover .card-front::after { opacity: 1; }

  /* ─── Overlay (click to enlarge + flip) ─── */
  .card-overlay {
    position: fixed; inset: 0; z-index: 9000;
    display: flex; align-items: center; justify-content: center;
    background: rgba(14, 14, 12, 0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s;
  }
  .card-overlay.active { opacity: 1; pointer-events: auto; cursor: pointer; }
  .card-overlay .overlay-card {
    width: min(380px, 85vw);
    aspect-ratio: 3 / 4.2;
    border-radius: 14px;
    perspective: 1000px;
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    transform: scale(0.8);
  }
  .card-overlay.active .overlay-card { transform: scale(1); }
  .card-overlay .overlay-inner {
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
  }
  .card-overlay.flipped .overlay-inner { transform: rotateY(180deg); }
  .card-overlay .overlay-front,
  .card-overlay .overlay-back {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.3);
  }
  .card-overlay .overlay-back { transform: rotateY(180deg); background: var(--accent); }
  .card-overlay img { display: block; width: 100%; height: 100%; object-fit: cover; }
  .overlay-hint {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    font-family: var(--sans); font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase; color: rgba(229,228,226,0.6); font-weight: 600;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .card-overlay.flipped .overlay-hint { opacity: 0; }

  /* Scattered rotations — assigned via inline style */
  .id-card:nth-child(1)  { --rot: -3deg; }
  .id-card:nth-child(2)  { --rot: 2deg; }
  .id-card:nth-child(3)  { --rot: -1.5deg; }
  .id-card:nth-child(4)  { --rot: 3deg; }
  .id-card:nth-child(5)  { --rot: -2deg; }
  .id-card:nth-child(6)  { --rot: 1deg; }
  .id-card:nth-child(7)  { --rot: -2.5deg; }
  .id-card:nth-child(8)  { --rot: 2.5deg; }
  .id-card:nth-child(9)  { --rot: -1deg; }
  .id-card:nth-child(10) { --rot: 3.5deg; }
  .id-card:nth-child(11) { --rot: -3.5deg; }

  /* ─── Entrance animation ─── */
  @keyframes card-deal {
    from {
      opacity: 0;
      transform: translateY(60px) rotate(calc(var(--rot) * 3)) scale(0.85);
    }
    to {
      opacity: 1;
      transform: translateY(0) rotate(var(--rot)) scale(1);
    }
  }
  @keyframes card-float {
    0%, 100% { transform: translateY(0) rotate(var(--rot)); }
    50%      { transform: translateY(-6px) rotate(var(--rot)); }
  }

  @media (prefers-reduced-motion: no-preference) {
    .id-card {
      opacity: 0;
      animation: card-deal 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards,
                 card-float 4s ease-in-out infinite;
      animation-delay: var(--delay), calc(var(--delay) + 0.7s);
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .id-card { transform: rotate(var(--rot)); }
  }

  /* ─── Head trainer call-out ─── */
  .id-card.head-trainer {
    width: 280px;
    flex-basis: 100%;
    max-width: 280px;
    box-shadow: 0 12px 40px rgba(19, 56, 190, 0.25), 0 4px 12px rgba(0, 0, 0, 0.1);
  }
  .id-card.head-trainer:hover {
    box-shadow: 0 24px 60px rgba(19, 56, 190, 0.3), 0 8px 24px rgba(0, 0, 0, 0.12);
  }

  /* ─── Footer ─── */
  .doc-foot-graphic {
    width: 100%; line-height: 0;
  }
  .doc-foot-graphic img {
    display: block; width: 100%; height: auto;
  }

  /* ─── Loader ─── */
  .nc-loader {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    animation: nc-loader-out 0.55s cubic-bezier(0.65, 0, 0.35, 1) 1.15s forwards;
  }
  .nc-loader-mark {
    font-family: var(--sans); font-size: 12px; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--ink); text-align: center;
    opacity: 0; animation: nc-mark-in 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
  }
  .nc-loader-mark .x { color: var(--accent); margin: 0 0.5em; }
  .nc-loader-rule {
    position: relative; height: 1.5px; width: 200px; max-width: 56vw;
    margin: 20px auto 0; background: var(--rule); overflow: hidden;
  }
  .nc-loader-rule span {
    position: absolute; inset: 0; background: var(--accent);
    transform: scaleX(0); transform-origin: left;
    animation: nc-rule-draw 0.95s cubic-bezier(0.65, 0, 0.35, 1) 0.3s forwards;
  }
  .nc-loader-globe {
    display: block; width: 64px; height: 64px; margin: 0 auto 24px;
    border-radius: 50%; box-shadow: 0 6px 22px rgba(19, 56, 190, 0.28);
    animation: nc-globe-spin 3s linear infinite;
  }
  @keyframes nc-globe-spin { from { transform: perspective(520px) rotateY(0deg); } to { transform: perspective(520px) rotateY(360deg); } }
  @keyframes nc-loader-out { to { opacity: 0; visibility: hidden; } }
  @keyframes nc-mark-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes nc-rule-draw { to { transform: scaleX(1); } }
  @media (prefers-reduced-motion: reduce) {
    .nc-loader { display: none; }
    *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }

  @media (max-width: 600px) {
    .card-grid { gap: 20px; }
    .id-card { width: calc(50% - 10px); }
    .cards-section { padding: 6vh 20px 10vh; }
    .id-card.head-trainer { width: 240px; max-width: 240px; }
  }
</style>
</head>
<body>

<div class="nc-loader" aria-hidden="true">
  <div>
    <img class="nc-loader-globe" src="/january-digital/nct-globe.png" alt="" />
    <div class="nc-loader-mark">January&nbsp;Digital <span class="x">&times;</span> NotContent</div>
    <div class="nc-loader-rule"><span></span></div>
  </div>
</div>

<div class="hero-img">
  <div class="topbar">
    <a class="back" href="/january-digital"><span class="arrow">&larr;</span>Back to hub</a>
    <span class="label">The Team</span>
  </div>
  <img src="/january-digital/team/header.png" alt="NotContent — January Digital Training ID Cards" />
</div>

<div class="cards-section">
  <div class="head">
    <div class="eyebrow">Cohort 2026</div>
    <h2>Meet the <span class="accent">team.</span></h2>
  </div>

  <div class="card-grid">

    <div class="id-card head-trainer" style="--delay: 0.1s; --rot: 0deg;" data-front="/january-digital/team/id-jeremy-trainer.png" data-back="/january-digital/team/id-jeremy-trainer-back.png">
      <div class="card-inner">
        <div class="card-front"><img src="/january-digital/team/id-jeremy-trainer.png" alt="Jeremy — Head Trainer" /></div>
        <div class="card-back"></div>
      </div>
    </div>

    <div class="id-card" style="--delay: 0.18s;" data-front="/january-digital/team/id-addison.png" data-back="/january-digital/team/id-addison-back.png">
      <div class="card-inner">
        <div class="card-front"><img src="/january-digital/team/id-addison.png" alt="Addison" /></div>
        <div class="card-back"></div>
      </div>
    </div>

    <div class="id-card" style="--delay: 0.26s;" data-front="/january-digital/team/id-chris.png" data-back="/january-digital/team/id-chris-back.png">
      <div class="card-inner">
        <div class="card-front"><img src="/january-digital/team/id-chris.png" alt="Chris" /></div>
        <div class="card-back"></div>
      </div>
    </div>

    <div class="id-card" style="--delay: 0.34s;" data-front="/january-digital/team/id-christina.png" data-back="/january-digital/team/id-christina-back.png">
      <div class="card-inner">
        <div class="card-front"><img src="/january-digital/team/id-christina.png" alt="Christina" /></div>
        <div class="card-back"></div>
      </div>
    </div>

    <div class="id-card" style="--delay: 0.42s;" data-front="/january-digital/team/id-jared.png" data-back="/january-digital/team/id-jared-back.png">
      <div class="card-inner">
        <div class="card-front"><img src="/january-digital/team/id-jared.png" alt="Jared" /></div>
        <div class="card-back"></div>
      </div>
    </div>

    <div class="id-card" style="--delay: 0.5s;" data-front="/january-digital/team/id-jeremy.png" data-back="/january-digital/team/id-jeremy-back.png">
      <div class="card-inner">
        <div class="card-front"><img src="/january-digital/team/id-jeremy.png" alt="Jeremy" /></div>
        <div class="card-back"></div>
      </div>
    </div>

    <div class="id-card" style="--delay: 0.58s;" data-front="/january-digital/team/id-justin.png" data-back="/january-digital/team/id-justin-back.png">
      <div class="card-inner">
        <div class="card-front"><img src="/january-digital/team/id-justin.png" alt="Justin" /></div>
        <div class="card-back"></div>
      </div>
    </div>

    <div class="id-card" style="--delay: 0.66s;" data-front="/january-digital/team/id-luisa.png" data-back="/january-digital/team/id-luisa-back.png">
      <div class="card-inner">
        <div class="card-front"><img src="/january-digital/team/id-luisa.png" alt="Luisa" /></div>
        <div class="card-back"></div>
      </div>
    </div>

    <div class="id-card" style="--delay: 0.74s;" data-front="/january-digital/team/id-omama.png" data-back="/january-digital/team/id-omama-back.png">
      <div class="card-inner">
        <div class="card-front"><img src="/january-digital/team/id-omama.png" alt="Omama" /></div>
        <div class="card-back"></div>
      </div>
    </div>

    <div class="id-card" style="--delay: 0.82s;" data-front="/january-digital/team/id-salome.png" data-back="/january-digital/team/id-salome-back.png">
      <div class="card-inner">
        <div class="card-front"><img src="/january-digital/team/id-salome.png" alt="Salome" /></div>
        <div class="card-back"></div>
      </div>
    </div>

    <div class="id-card" style="--delay: 0.9s;" data-front="/january-digital/team/id-vic.png" data-back="/january-digital/team/id-vic-back.png">
      <div class="card-inner">
        <div class="card-front"><img src="/january-digital/team/id-vic.png" alt="Vic" /></div>
        <div class="card-back"></div>
      </div>
    </div>

  </div>
</div>

<!-- Overlay for enlarged card view -->
<div class="card-overlay" id="card-overlay">
  <div class="overlay-card">
    <div class="overlay-inner">
      <div class="overlay-front"><img id="overlay-front-img" src="" alt="" /></div>
      <div class="overlay-back"><img id="overlay-back-img" src="" alt="" /></div>
    </div>
  </div>
  <div class="overlay-hint">Click to flip &middot; click again to close</div>
</div>

<footer class="doc-foot-graphic">
  <img src="/january-digital/footer-graphic.png" alt="NotContent — AI Creative Training for Creative Teams and Brands" />
</footer>

<script>
  const overlay = document.getElementById('card-overlay');
  const frontImg = document.getElementById('overlay-front-img');
  const backImg = document.getElementById('overlay-back-img');

  document.querySelectorAll('.id-card').forEach(card => {
    card.addEventListener('click', () => {
      const front = card.dataset.front;
      const back = card.dataset.back;
      frontImg.src = front;
      backImg.src = back;
      overlay.classList.remove('flipped');
      overlay.classList.add('active');
    });
  });

  overlay.addEventListener('click', () => {
    if (overlay.classList.contains('flipped')) {
      overlay.classList.remove('active', 'flipped');
    } else {
      overlay.classList.add('flipped');
    }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && overlay.classList.contains('active')) {
      overlay.classList.remove('active', 'flipped');
    }
  });
</script>

</body>
</html>
