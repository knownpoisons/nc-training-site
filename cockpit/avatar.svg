<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Cobalt Paper — cream field, cobalt mark. The Cockpit gauge + barcode. -->
  <rect width="512" height="512" rx="112" fill="#F4F1E9"/>
  <rect x="8" y="8" width="496" height="496" rx="106" fill="none" stroke="#0a24b8" stroke-width="4" opacity="0.14"/>

  <!-- the gauge ring: a cockpit dial -->
  <circle cx="256" cy="238" r="132" fill="none" stroke="#1437e8" stroke-width="20"/>
  <!-- swept progress arc, ~72% -->
  <path d="M 256 106 A 132 132 0 1 1 155 305" fill="none" stroke="#0a24b8" stroke-width="20" stroke-linecap="round"/>
  <!-- centre pip -->
  <circle cx="256" cy="238" r="30" fill="#1437e8"/>

  <!-- barcode band — the Deck's signature progress marks -->
  <g fill="#111111">
    <rect x="150" y="418" width="8" height="44"/>
    <rect x="166" y="418" width="14" height="44"/>
    <rect x="188" y="418" width="6" height="44"/>
    <rect x="202" y="418" width="20" height="44"/>
    <rect x="230" y="418" width="8" height="44"/>
    <rect x="246" y="418" width="16" height="44"/>
    <rect x="270" y="418" width="6" height="44"/>
    <rect x="284" y="418" width="12" height="44"/>
  </g>
  <g fill="#1437e8">
    <rect x="304" y="418" width="20" height="44"/>
    <rect x="332" y="418" width="10" height="44"/>
    <rect x="350" y="418" width="12" height="44"/>
  </g>
</svg>
